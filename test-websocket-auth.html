<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Auth Test</title>
</head>
<body>
    <h2>WebSocket Authentication Test</h2>
    <button onclick="testWithoutToken()">Test WITHOUT Token (Should Fail)</button>
    <button onclick="testWithToken()">Test WITH Token (Should Work)</button>
    <pre id="result"></pre>

    <script>
        const wsUrl = 'wss://uoytqx91i5.execute-api.us-east-1.amazonaws.com/production';
        const result = document.getElementById('result');

        function testWithoutToken() {
            result.textContent = 'Connecting without token...\n';
            const ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                result.textContent += '❌ SECURITY ISSUE: Connected without authentication!\n';
            };
            
            ws.onerror = (error) => {
                result.textContent += '✅ GOOD: Connection rejected (auth working)\n';
            };
            
            ws.onclose = (event) => {
                result.textContent += `Connection closed: ${event.code} - ${event.reason}\n`;
            };
        }

        function testWithToken() {
            const token = localStorage.getItem('idToken');
            if (!token) {
                result.textContent = '❌ No token found. Please login first.\n';
                return;
            }
            
            result.textContent = 'Connecting with token...\n';
            const ws = new WebSocket(`${wsUrl}?token=${encodeURIComponent(token)}`);
            
            ws.onopen = () => {
                result.textContent += '✅ Connected successfully with authentication\n';
                ws.close();
            };
            
            ws.onerror = (error) => {
                result.textContent += '❌ Connection failed even with token\n';
            };
        }
    </script>
</body>
</html>
