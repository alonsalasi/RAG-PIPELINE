name: ECS GitOps Pipeline

on:
  repository_dispatch:
    types: [create-ecs-cluster, delete-ecs-cluster]

jobs:
  manage-ecs-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Create Cluster Config
        if: github.event.action == 'create-ecs-cluster'
        run: |
          CLUSTER_NAME="${{ github.event.client_payload.clusterName }}"
          CAPACITY="${{ github.event.client_payload.capacityProvider }}"
          INSIGHTS="${{ github.event.client_payload.containerInsights }}"
          SAFE_NAME=$(echo "$CLUSTER_NAME" | tr '-' '_')
          
          cat >> ecs-clusters.tf << EOF
          
          resource "aws_ecs_cluster" "cluster_${SAFE_NAME}" {
            cluster_name = "${CLUSTER_NAME}"
            capacity_providers = ["${CAPACITY}"]
            
            default_capacity_provider_strategy {
              capacity_provider = "${CAPACITY}"
              weight = 1
            }
            
            setting {
              name  = "containerInsights"
              value = "${INSIGHTS}"
            }
            
            tags = {
              Name = "${CLUSTER_NAME}"
              ManagedBy = "K8s-GitOps"
              CreatedBy = "${{ github.event.client_payload.user }}"
            }
          }
          EOF
      
      - name: Delete Cluster Config
        if: github.event.action == 'delete-ecs-cluster'
        run: |
          CLUSTER_NAME="${{ github.event.client_payload.clusterName }}"
          SAFE_NAME=$(echo "$CLUSTER_NAME" | tr '-' '_')
          sed -i "/resource \"aws_ecs_cluster\" \"cluster_${SAFE_NAME}\"/,/^}/d" ecs-clusters.tf
      
      - name: Commit Changes
        run: |
          git config user.name "K8s Platform Bot"
          git config user.email "platform@k8s.local"
          git add ecs-clusters.tf
          
          if [ "${{ github.event.action }}" == "create-ecs-cluster" ]; then
            git commit -m "K8s Platform: Create ECS cluster ${{ github.event.client_payload.clusterName }}"
          else
            git commit -m "K8s Platform: Delete ECS cluster ${{ github.event.client_payload.clusterName }}"
          fi
          
          git push
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Apply
        run: terraform apply -auto-approve
